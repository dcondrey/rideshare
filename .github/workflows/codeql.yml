# CodeQL static analysis: every push to main, every PR targeting main, and a weekly Sunday cron.
# The cron catches new CodeQL queries / database fixes that GitHub ships independent of our code.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sundays at 06:17 UTC — odd minute to avoid the top-of-hour herd on shared runners.
    - cron: '17 6 * * 0'

# A new push to the same branch supersedes the prior CodeQL run.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # CodeQL needs write access to the security events stream to upload findings.
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # Single-language matrix today; structured this way so adding e.g. 'typescript' is one line.
        language: ['javascript']
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        # github/codeql-action v3.28.10 (2025-02-25). 'security-and-quality' is the broadest standard pack.
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3.28.10
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3.28.10
        with:
          category: '/language:${{ matrix.language }}'
